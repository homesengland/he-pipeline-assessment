<div>
  <multi-expression-editor>
    <ng-template
      #multiExpressionEditor
      [(label)]="propertyDescriptor().label"
      [defaultSyntax]="SyntaxNames.Json"
      [(supportedSyntaxes)]="SyntaxNames.Json"
      [(context)]="context"
      [expressions]="{ Json: json}"
      editor-height="20rem"
      (onExpressionChanged)="this.onMultiExpressionEditorValueChanged($event)"
      (onSyntaxChanged)="this.onMultiExpressionEditorSyntaxChanged($event)"
    ></ng-template>
